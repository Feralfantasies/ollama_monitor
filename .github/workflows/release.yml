name: Binary Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  create-tag:
    name: Create Semantic Version Tag
    runs-on: firethorn
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: v

  build-binary:
    name: Build Binary
    runs-on: firethorn
    needs: create-tag
    if: needs.create-tag.outputs.new_tag
    steps:
      - name: Install system dependencies
        run: |
          for i in 1 2 3; do
            sudo apt-get update -qq && sudo apt-get install -y build-essential pkg-config musl-tools && break
            echo "apt-get attempt $i failed; retrying in 10 s..."
            sleep 10
          done

      - name: Checkout
        uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          shared-key: release

      - name: cargo build — release (musl static)
        run: RUSTFLAGS="-D warnings" cargo build --release --target x86_64-unknown-linux-musl

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ollama_monitor-x86_64-linux-musl
          path: target/x86_64-unknown-linux-musl/release/ollama_monitor
          retention-days: 1

  create-release:
    name: Create GitHub Release
    runs-on: firethorn
    needs: [create-tag, build-binary]
    if: needs.create-tag.outputs.new_tag
    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: ollama_monitor-x86_64-linux-musl

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-tag.outputs.new_tag }}
          name: Release ${{ needs.create-tag.outputs.new_tag }}
          body: |
            ## 🚀 What's Changed
            ${{ needs.create-tag.outputs.changelog }}

            ## 📦 Binary Release
            - `ollama_monitor` — statically-linked x86_64 Linux (musl) binary

            ## 🛠️ Usage
            ```bash
            # Download and install
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ needs.create-tag.outputs.new_tag }}/ollama_monitor
            chmod +x ollama_monitor
            sudo mv ollama_monitor /usr/local/bin/

            # Configure
            cp config.example.toml config.toml
            # Edit config.toml with your Ollama endpoint settings

            # Run
            ollama_monitor --config config.toml
            ```

            See [config.example.toml](https://github.com/${{ github.repository }}/blob/${{ needs.create-tag.outputs.new_tag }}/config.example.toml) for configuration options.
          draft: false
          prerelease: false
          files: ollama_monitor
