name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Format ──────────────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ── 2. Clippy ─────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          shared-key: clippy

      - name: cargo clippy — deny all warnings
        run: cargo clippy --all-targets -- -D warnings

  # ── 3. Build ──────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          shared-key: build

      - name: cargo build — warnings as errors
        run: RUSTFLAGS="-D warnings" cargo build

  # ── 4. Build static musl binary ───────────────────────────────────────────
  build-musl:
    name: Build (musl)
    runs-on: self-hosted
    needs: [fmt, clippy]
    steps:
      - name: Install system dependencies
        run: |
          for i in 1 2 3; do
            sudo apt-get update -qq && sudo apt-get install -y build-essential pkg-config musl-tools && break
            echo "apt-get attempt $i failed; retrying in 10 s..."
            sleep 10
          done

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          shared-key: build-musl

      - name: cargo build — musl static target
        run: RUSTFLAGS="-D warnings" cargo build --release --target x86_64-unknown-linux-musl
